<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Health Monitoring System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">🏥</div>
                <h2>Health Worker Login</h2>
            
            </div>

            <div class="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Username">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password">
                </div>

                <button onclick="login()" class="btn btn-primary btn-full">Login</button>
            </div>

            <div class="login-footer">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

<script>
    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                window.location.href = 'data-entry.html';
                return;
            }

            const result = await response.json().catch(() => ({}));
            alert(result.error || "Invalid username or password");
        } catch (e) {
            alert("Cannot connect to server. Please ensure the app is running.");
        }
    }
</script>

</body>
</html>
